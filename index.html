<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Puentes de Escucha 🌸 COUNSELING</title>
  <link rel="stylesheet" href="css/styles.css"> </head>
<body>
  <header onclick="openSection('enciclopedia')" title="Volver al Inicio">
    <h1>Puentes de Escucha 🌸 COUNSELING</h1>
  </header>
  <div class="app-container" id="main-app-container">
    
    <aside class="col col-categorias collapsed" id="sidebar-menu">
      <div class="menu-toggle-container">
        <button class="menu-toggle-btn" onclick="toggleMenu()" title="Expandir/Contraer Menú">☰</button>
      </div>
      <div class="menu-list-fixed" id="list-categorias"></div>
    </aside>

    <section class="col col-conceptos">
      <div class="master-glossary-card">
        <div class="glossary-header">
           <h2>Conceptos y Enlaces</h2>
           <div class="glossary-stats" id="glossary-stats"></div>
        </div>
        <div class="conceptos-grid" id="grid-conceptos">
          <div class="empty-state">Cargando la enciclopedia...</div>
        </div>
      </div>
    </section>

    <article class="col col-tarjeta" id="col-tarjeta-container">
      <button class="btn-mobile-close" onclick="closeMobileDetail()">Volver a la Enciclopedia</button>
      <div class="col-content" id="detail-tarjeta"></div>
    </article>

    <section class="col col-blog" id="col-blog-container" style="display:none; padding: 20px; overflow-y: auto; background: var(--bg-panel);">
        <h2 style="font-family: 'Merriweather', serif; font-size: 2rem; color: #2c3e50; margin-bottom: 20px;">Reflexiones y Artículos</h2>
        <div id="blog-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
             </div>
    </section>

    <section class="col col-game" id="col-game-container">
      <button class="btn-mobile-close" onclick="openSection('cv')">Salir</button>
      <div class="game-wrapper" id="arcade-main-view"></div>
    </section>

  </div>
  
  <footer>
    Lilian Beatriz Romano. Counselor | Actualizado: 11/06/2026 20:38 🌸
  </footer>

  <script src="js/data.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/blog.js"></script>
  <script src="js/games.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
